{% extends 'base_template.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} | STATZ{% endblock %}

{% block body %}
<div class="container py-4" style="max-width: 800px;">
    <div class="d-flex align-items-center mb-4">
        <a href="{% url 'mailer:campaign_list' %}" class="btn btn-outline-secondary me-3 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        </a>
        <h2 class="mb-0">{{ title }}</h2>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                
                <div class="mt-4 d-flex justify-content-end">
                    <a href="{% url 'mailer:campaign_list' %}" class="btn btn-light me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Campaign</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
