<!-- IDIQ Contract Selection Modal -->
<div id="idiq_modal" class="fixed inset-0 modal-backdrop-overlay hidden z-50">
    <div class="relative top-20 mx-auto card card-padded border max-w-md shadow-lg">
        <div class="row-between border-b pb-3">
            <h3 class="text-lg font-semibold text-gray-900">Select IDIQ Contract</h3>
            <button type="button" onclick="closeIdiqModal()" class="text-gray-400 hover:text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="mt-4">
            <!-- Original IDIQ Info -->
            <div class="mb-4 p-3 bg-gray-50 rounded">
                <h4 class="label mb-2 text-gray-700">Original IDIQ Contract Information:</h4>
                <p id="original_idiq_display" class="text-gray-900"></p>
                <button type="button"
                        onclick="showAddIdiqForm()"
                        class="mt-2 px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-500">
                    Add as New IDIQ
                </button>
            </div>

            <!-- Add IDIQ Form (Initially Hidden) -->
            <div id="add_idiq_form" class="mb-4 hidden">
                <h4 class="label mb-2 text-gray-700">Add New IDIQ Contract</h4>
                <div class="space-y-3">
                    <div>
                        <label class="block label mb-1 text-gray-700">Contract Number</label>
                        <input type="text" id="new_idiq_contract_number" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    <button type="button"
                            onclick="createNewIdiq()"
                            class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">
                        Create IDIQ
                    </button>
                </div>
            </div>

            <!-- Search Section -->
            <div class="mb-4">
                <label for="idiq_search" class="block label mb-1 text-gray-700">Search IDIQ Contract</label>
                <div class="flex space-x-2">
                    <input type="text" id="idiq_search" class="form-control flex-1" placeholder="Enter contract number...">
                    <button type="button" onclick="searchIdiq()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Search
                    </button>
                </div>
                <p class="text-sm text-gray-500 mt-1">Enter at least 3 characters to search</p>
            </div>

            <!-- Results Section -->
            <div id="idiq_search_results" class="mt-4 max-h-[300px] overflow-y-auto">
                <!-- Results will be populated here -->
                <div class="text-center text-gray-500 py-4">Search for IDIQ contract by number</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-4 flex justify-end border-t pt-3">
            <button type="button" onclick="closeIdiqModal()"
                    style="btn btn-caution; padding: 0.5rem 1rem; border-radius: 0.25rem; display: inline-block; transition: background-color 0.3s;">
                Cancel
            </button>
        </div>
    </div>
</div>
