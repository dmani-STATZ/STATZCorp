<!-- NSN Selection Modal (contracts CLIN form) -->
<div id="nsn-modal" class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto bg-gray-600 bg-opacity-50 pt-16 pb-8" style="display: none;">
    <div class="relative mx-4 w-full max-w-md rounded-lg border bg-white shadow-lg card card-padded">
        <div class="row-between border-b pb-3">
            <h3 class="text-lg font-semibold text-gray-900">Select NSN</h3>
            <button type="button" onclick="closeNsnModal()" class="text-gray-400 hover:text-gray-500" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="mt-4">
            <div class="mb-4">
                <a href="{% url 'contracts:nsn_search' %}"
                   class="text-sm font-medium text-blue-600 hover:text-blue-800">Open NSN search</a>
            </div>

            <div class="mb-4">
                <label for="nsn_search" class="mb-1 block text-sm font-medium text-gray-700">Search NSN</label>
                <div class="flex gap-2">
                    <input type="text" id="nsn_search" class="form-control min-w-0 flex-1" placeholder="Enter NSN code or description" autocomplete="off">
                    <button type="button" onclick="searchNsn()" class="rounded bg-blue-500 px-4 py-2 text-white hover:bg-blue-600">
                        Search
                    </button>
                </div>
                <p class="mt-1 text-sm text-gray-500">Enter at least 3 characters to search</p>
            </div>

            <div id="nsn_search_results" class="mt-4 overflow-y-auto rounded border border-gray-100" style="max-height: 300px">
                <div class="py-4 text-center text-gray-500">Search for NSN by code or description</div>
            </div>

            <div id="nsn_pagination" class="mt-3 hidden flex items-center justify-between gap-2">
                <button type="button" id="nsn_prev_page" class="rounded bg-gray-200 px-3 py-1 text-sm text-gray-800 hover:bg-gray-300 disabled:opacity-50" disabled>Previous</button>
                <span id="nsn_page_info" class="text-sm text-gray-600">Page 1 of 1</span>
                <button type="button" id="nsn_next_page" class="rounded bg-gray-200 px-3 py-1 text-sm text-gray-800 hover:bg-gray-300 disabled:opacity-50" disabled>Next</button>
            </div>
        </div>

        <div class="mt-4 flex justify-end border-t pt-3">
            <button type="button" onclick="closeNsnModal()" class="btn btn-caution rounded-md px-4 py-2">
                Cancel
            </button>
        </div>
    </div>
</div>
