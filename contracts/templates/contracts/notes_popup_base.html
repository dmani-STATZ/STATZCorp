{% load static %}
{% load custom_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notes{% endblock %}</title>
    {% is_development as dev_mode %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% if dev_mode %}
        <link rel="stylesheet" href="{% static 'css/theme-vars.css' %}?v={{ cache_version }}-{{ request.id|default:'' }}">
        <link rel="stylesheet" href="{% static 'css/app-core.css' %}?v={{ cache_version }}-{{ request.id|default:'' }}">
        <link rel="stylesheet" href="{% static 'css/utilities.css' %}?v={{ cache_version }}-{{ request.id|default:'' }}">
    {% else %}
        <link rel="stylesheet" href="{% static 'css/theme-vars.css' %}?v={{ cache_version }}">
        <link rel="stylesheet" href="{% static 'css/app-core.css' %}?v={{ cache_version }}">
        <link rel="stylesheet" href="{% static 'css/utilities.css' %}?v={{ cache_version }}">
    {% endif %}
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-body-tertiary m-0 p-0">
    <form autocomplete="off" class="d-none" aria-hidden="true">{% csrf_token %}</form>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
