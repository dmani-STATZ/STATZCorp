{% load crispy_forms_tags %}

<!-- Note Modal -->
<div id="noteModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen p-4">
        <!-- Modal backdrop -->
        <div class="fixed inset-0 bg-black opacity-50" id="noteModalBackdrop"></div>

        <!-- Modal content -->
        <div class="relative bg-body rounded-lg shadow-xl max-w-2xl w-full mx-auto z-10">
            <!-- Modal header -->
            <div class="row-between p-4 border-b">
                <h3 class="text-xl font-semibold" id="noteModalTitle">Add Note</h3>
                <button type="button" class="btn-close" aria-label="Close" id="closeNoteModal"></button>
            </div>

            <!-- Modal body -->
            <div class="p-6">
                <form id="noteForm" method="post" class="space-y-4">
                    {% csrf_token %}
                    <input type="hidden" id="noteContentTypeId" name="content_type_id" value="">
                    <input type="hidden" id="noteObjectId" name="object_id" value="">
                    <input type="hidden" id="noteReferringUrl" name="referring_url" value="">
                    <input type="hidden" name="form-type" value="modal-note-form">

                    <div class="space-y-4">
                        <div class="form-group">
                            <label for="id_note" class="block text-sm font-medium text-gray-700 mb-1">Note Details</label>
                            <textarea id="id_note" name="note" rows="4" class="form-control" placeholder="Enter Note"></textarea>
                        </div>
                    </div>

                    <!-- Reminder section -->
                    <div class="mt-6 pt-4 border-t border">
                        <div class="flex items-center mb-4">
                            <input type="checkbox" id="createReminder" name="create_reminder" class="h-4 w-4 text-blue-600 border rounded focus:ring-blue-500">
                            <label for="createReminder" class="ml-2 block text-sm font-medium text-gray-700">Create a reminder for this note</label>
                        </div>

                        <div id="reminderFields" class="space-y-4 hidden">
                            <div class="form-group">
                                <label for="id_reminder_title" class="block text-sm font-medium text-gray-700 mb-1">Reminder Title</label>
                                <input type="text" id="id_reminder_title" name="reminder_title" class="form-control" placeholder="Enter Reminder Title">
                            </div>

                            <div class="form-group">
                                <label for="id_reminder_text" class="block text-sm font-medium text-gray-700 mb-1">Reminder Details</label>
                                <textarea id="id_reminder_text" name="reminder_text" rows="2" class="form-control" placeholder="Enter Reminder Details"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="id_reminder_date" class="block text-sm font-medium text-gray-700 mb-1">Reminder Date</label>
                                <input type="datetime-local" id="id_reminder_date" name="reminder_date" class="form-control">
                            </div>

                            <div class="form-group">
                                <div class="flex items-center">
                                    <input type="checkbox" id="id_reminder_completed" name="reminder_completed" class="h-4 w-4 text-blue-600 border rounded focus:ring-blue-500">
                                    <label for="id_reminder_completed" class="ml-2 block text-sm font-medium text-gray-700">Reminder Completed</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Modal footer -->
            <div class="flex justify-end space-x-3 p-4 border-t border">
                <button type="button" class="btn btn-secondary" id="cancelNoteModal">
                    Cancel
                </button>
                <button type="button" class="btn btn-success" id="saveNoteBtn">
                    Save Note
                </button>
            </div>
        </div>
    </div>
</div>
