{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
        document.documentElement.className = 'no-fouc';
        window.onload = function() { document.documentElement.className = ''; }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Documents Browser</title>
    <link rel="stylesheet" href="{% static 'css/spacelab.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme-vars.css' %}">
    <link rel="stylesheet" href="{% static 'css/app-core.css' %}">
    <link rel="stylesheet" href="{% static 'css/utilities.css' %}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
        }

        .docs-browser-app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── Theme overrides ── */
        [data-bs-theme="light"] .docs-header { background: #ffffff; border-color: #e9ecef; }
        [data-bs-theme="light"] .docs-breadcrumb { background: #f8f9fa; border-color: #e9ecef; }
        [data-bs-theme="light"] .docs-toolbar { background: #ffffff; border-color: #e9ecef; }
        [data-bs-theme="light"] .docs-list-header { background: #f8f9fa; border-color: #e9ecef; }
        [data-bs-theme="light"] .docs-file-list li { border-color: #f1f3f5; }
        [data-bs-theme="light"] .docs-file-list li:hover { background: #f8f9fa; }

        [data-bs-theme="dark"] body { background: #212529; color: #dee2e6; }
        [data-bs-theme="dark"] .docs-header { background: #212529; border-color: #373b3e; }
        [data-bs-theme="dark"] .docs-breadcrumb { background: #2b2f33; border-color: #373b3e; }
        [data-bs-theme="dark"] .docs-toolbar { background: #212529; border-color: #373b3e; }
        [data-bs-theme="dark"] .docs-toolbar .docs-search {
            background: #2b2f33; border-color: #495057; color: #dee2e6;
        }
        [data-bs-theme="dark"] .docs-toolbar .docs-search::placeholder { color: #6c757d; }
        [data-bs-theme="dark"] .docs-list-header { background: #2b2f33; border-color: #373b3e; color: #adb5bd; }
        [data-bs-theme="dark"] .docs-file-list li { border-color: #2b2f33; color: #dee2e6; }
        [data-bs-theme="dark"] .docs-file-list li:hover { background: #2b2f33; }
        [data-bs-theme="dark"] .docs-file-list li.folder { color: var(--company-primary, #6ea8fe); }
        [data-bs-theme="dark"] .docs-file-area { background: #212529; }
        [data-bs-theme="dark"] .docs-banner.warning {
            background: #332d00; color: #ffc107; border-color: #665800;
        }
        [data-bs-theme="dark"] .docs-banner.error {
            background: #2c0b0e; color: #ea868f; border-color: #842029;
        }
        [data-bs-theme="dark"] .docs-upload-progress {
            background: #2b2f33; border-color: #373b3e;
        }

        /* ── Header ── */
        .docs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
            background: #fff;
        }

        .docs-header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            overflow: hidden;
        }

        .docs-header-title strong {
            font-size: 16px;
            font-weight: 600;
            color: #212529;
            white-space: nowrap;
        }

        .docs-header-sep {
            color: #adb5bd;
            flex-shrink: 0;
        }

        .docs-header-contract {
            color: #6c757d;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .docs-header-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            margin-left: 16px;
        }

        /* ── Banner ── */
        .docs-banner-container {
            flex-shrink: 0;
        }

        .docs-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            font-size: 13px;
            border-bottom: 1px solid transparent;
        }

        [data-bs-theme="light"] .docs-banner.warning {
            background: #fff3cd;
            color: #856404;
            border-bottom-color: #ffeaa7;
        }

        [data-bs-theme="light"] .docs-banner.error {
            background: #f8d7da;
            color: #721c24;
            border-bottom-color: #f5c6cb;
        }

        .docs-banner.success {
            background: #d4edda;
            color: #155724;
            border-bottom-color: #c3e6cb;
        }

        .docs-banner-close {
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.6;
            font-size: 16px;
            line-height: 1;
            padding: 0 0 0 12px;
            flex-shrink: 0;
        }

        .docs-banner-close:hover {
            opacity: 1;
        }

        /* ── Breadcrumb ── */
        .docs-breadcrumb {
            padding: 8px 16px;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
            overflow: hidden;
        }

        .docs-breadcrumb-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
        }

        .docs-breadcrumb-list li {
            display: inline-flex;
            align-items: center;
            min-width: 0;
        }

        .docs-breadcrumb-list li:not(:first-child)::before {
            content: '›';
            color: #adb5bd;
            margin: 0 6px;
            flex-shrink: 0;
        }

        .docs-breadcrumb-list a {
            color: var(--company-primary, #0066cc);
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .docs-breadcrumb-list a:hover {
            text-decoration: underline;
        }

        .docs-breadcrumb-list .current {
            color: #495057;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Toolbar ── */
        .docs-toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
            align-items: center;
        }

        .docs-search {
            flex: 1;
            height: 32px;
            padding: 4px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 13px;
        }

        .docs-search:focus {
            outline: none;
            border-color: var(--company-primary, #0066cc);
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.15);
        }

        .docs-hidden-input {
            display: none;
        }

        /* ── File area ── */
        .docs-file-area {
            flex: 1;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .docs-file-area.dragover {
            background: rgba(0, 102, 204, 0.04);
            outline: 2px dashed var(--company-primary, #0066cc);
            outline-offset: -6px;
        }

        /* ── Upload progress ── */
        .docs-upload-progress {
            padding: 8px 16px;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .progress-item {
            margin-bottom: 8px;
            font-size: 12px;
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .progress-bar-container {
            background-color: #e9ecef;
            border-radius: 2px;
            height: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--company-primary, #0066cc);
            height: 100%;
            transition: width 0.2s ease;
        }

        /* ── Column header (sticky) ── */
        .docs-list-header {
            display: grid;
            grid-template-columns: 1fr 80px 100px 140px;
            padding: 6px 16px;
            font-size: 11px;
            text-transform: uppercase;
            color: #6c757d;
            font-weight: 600;
            border-bottom: 1px solid #e9ecef;
            position: sticky;
            top: 0;
            z-index: 1;
            flex-shrink: 0;
        }

        .docs-list-header .col-size,
        .docs-list-header .col-modified,
        .docs-list-header .col-author {
            text-align: right;
        }

        /* ── File list ── */
        .docs-file-list {
            list-style: none;
            margin: 0;
            padding: 0;
            flex: 1;
        }

        .docs-file-list li {
            display: grid;
            grid-template-columns: 1fr 80px 100px 140px;
            padding: 8px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f3f5;
            align-items: center;
        }

        .docs-file-list li.folder .col-name {
            font-weight: 500;
            color: var(--company-primary, #0066cc);
        }

        .docs-file-list .col-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .docs-file-list .col-size,
        .docs-file-list .col-modified,
        .docs-file-list .col-author {
            font-size: 12px;
            color: #6c757d;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .docs-empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
        }

        /* loading row */
        .docs-loading-row {
            display: flex !important;
            justify-content: center;
            align-items: center;
            padding: 40px 20px !important;
            grid-template-columns: unset !important;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--company-primary, #0066cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── Toast ── */
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #212529;
            color: white;
            padding: 12px 18px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            font-size: 13px;
            max-width: 320px;
            animation: slideIn 0.3s ease;
            z-index: 9999;
        }

        .toast-message.success { background-color: #28a745; }
        .toast-message.error   { background-color: #dc3545; }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to   { transform: translateX(0);     opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="docs-browser-app">

        <!-- Header -->
        <header class="docs-header">
            <div class="docs-header-title">
                <strong>Documents</strong>
                <span class="docs-header-sep">·</span>
                <span class="docs-header-contract" id="contract-name">{{ contract_number|default:"—" }}</span>
            </div>
            <div class="docs-header-actions">
                <button type="button" class="btn btn-sm btn-success" onclick="setCurrentPath()">Save Path</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="window.close()">Close Window</button>
            </div>
        </header>

        <!-- Banner (conditional) -->
        <div id="alert-banner" class="docs-banner-container">
            {% if error %}
            <div class="docs-banner error">
                <span>{{ error }}</span>
                <button class="docs-banner-close" onclick="dismissBanner(this)" aria-label="Dismiss">×</button>
            </div>
            {% endif %}
        </div>

        <!-- Breadcrumb -->
        <nav class="docs-breadcrumb" aria-label="Folder navigation">
            <ol id="breadcrumb-list" class="docs-breadcrumb-list"></ol>
        </nav>

        <!-- Toolbar -->
        <div class="docs-toolbar">
            <input type="text" id="search-input" class="docs-search"
                   placeholder="Search files and folders..." onkeyup="filterFileList()">
            <button type="button" class="btn btn-sm btn-outline-primary"
                    onclick="document.getElementById('file-input').click()">
                ⬆ Upload Files
            </button>
            <input type="file" id="file-input" class="docs-hidden-input" multiple
                   onchange="handleFileSelect(event)">
        </div>

        <!-- File area (drag-drop target) -->
        <div class="docs-file-area"
             ondragover="handleDragOver(event)"
             ondragleave="handleDragLeave(event)"
             ondrop="handleDrop(event)">

            <!-- Upload progress -->
            <div id="upload-progress" class="docs-upload-progress" style="display:none;"></div>

            <!-- Column header (sticky) -->
            <div class="docs-list-header">
                <div class="col-name">Name</div>
                <div class="col-size">Size</div>
                <div class="col-modified">Modified</div>
                <div class="col-author">Author</div>
            </div>

            <!-- File list rows -->
            <ul id="file-list" class="docs-file-list">
                <li class="docs-loading-row"><div class="loading-spinner"></div></li>
            </ul>

        </div>
    </div>

    <script>
        let currentContractId = {{ contract_id|default:"null" }};
        let currentFolderPath = "{{ initial_folder_path|default:''|escapejs }}";
        let currentFiles = [];
        let currentFolders = [];
        let legacyPathDetected = false;
        const LEGACY_BANNER_MESSAGE = "Legacy folder path detected. Showing default contract folder. Click 'Save Path' to update.";

        const STORAGE_KEY = 'statz_documents_contract_id';
        const CONTRACT_DETAILS_URL_TEMPLATE = "{% url 'contracts:contract_details_api' 0 %}";
        const SHAREPOINT_FILES_URL = "{% url 'contracts:sharepoint_files_api' %}";
        const SET_FILE_PATH_URL = "{% url 'contracts:set_file_path_api' %}";
        const MAX_UPLOAD_BYTES = 5 * 1024 * 1024;

        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const contractIdParam = params.get('contract_id');

            if (contractIdParam) {
                currentContractId = parseInt(contractIdParam, 10);
            }

            if (!currentContractId) {
                showAlert('No contract ID provided', 'error');
                return;
            }

            window.name = 'statz_documents';
            localStorage.setItem(STORAGE_KEY, String(currentContractId));
            loadContractAndFolder();

            window.addEventListener('storage', function(e) {
                if (e.key === STORAGE_KEY && e.newValue) {
                    const newContractId = parseInt(e.newValue, 10);
                    if (newContractId !== currentContractId) {
                        window.location.href = `/contracts/documents/?contract_id=${encodeURIComponent(newContractId)}`;
                    }
                }
            });
        });

        function contractDetailsUrl(contractId) {
            return CONTRACT_DETAILS_URL_TEMPLATE.replace('/0/', `/${contractId}/`);
        }

        function loadContractAndFolder() {
            fetch(contractDetailsUrl(currentContractId), {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            })
                .then(function(r) {
                    return r.json().then(function(data) {
                        if (!r.ok || !data.success) {
                            throw new Error(data.error || 'Contract not found');
                        }
                        return data;
                    });
                })
                .then(function(data) {
                    document.getElementById('contract-name').textContent = data.contract_number || `#${currentContractId}`;
                    if (!currentFolderPath) {
                        currentFolderPath = data.default_folder_path || '';
                    }
                    legacyPathDetected = !!data.legacy_detected;
                    loadFolderContents();
                })
                .catch(function(err) {
                    console.error('Error loading contract details:', err);
                    showAlert(err.message || 'Failed to load contract details', 'error');
                    loadFolderContents();
                });
        }

        function loadFolderContents() {
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = '<li class="docs-loading-row"><div class="loading-spinner"></div></li>';

            const params = new URLSearchParams({
                contract_id: currentContractId,
                folder_path: currentFolderPath
            });

            fetch(`${SHAREPOINT_FILES_URL}?${params}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            })
                .then(function(r) {
                    return r.json().then(function(data) {
                        if (!r.ok) {
                            throw new Error(data.error || 'Failed to load folder contents');
                        }
                        return data;
                    });
                })
                .then(function(data) {
                    clearAlert();

                    if (data.legacy_detected) {
                        legacyPathDetected = true;
                    }
                    if (legacyPathDetected) {
                        appendAlert(LEGACY_BANNER_MESSAGE, 'warning');
                    }

                    if (data.fell_back_to_root) {
                        const requestedPath = data.requestedPath || 'the contract folder';
                        appendAlert(
                            `Could not find "${requestedPath}". Showing the nearest available folder instead — use search or navigate to find your file.`,
                            'warning'
                        );
                    } else if (data.error) {
                        appendAlert(data.error, 'warning');
                    }

                    currentFiles = data.files || [];
                    currentFolders = data.folders || [];
                    currentFolderPath = data.currentPath || currentFolderPath;

                    renderFileList();
                    updateBreadcrumb();
                })
                .catch(function(err) {
                    console.error('Error loading folder contents:', err);
                    showAlert(err.message || 'Failed to load folder contents', 'error');
                    fileList.innerHTML = '<li class="docs-empty-state">Unable to load this folder.</li>';
                });
        }

        function renderFileList() {
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = '';

            if (currentFolders.length === 0 && currentFiles.length === 0) {
                fileList.innerHTML = '<li class="docs-empty-state">No files or folders in this directory</li>';
                return;
            }

            currentFolders.forEach(function(folder) {
                const item = createFileListItem(folder, true);
                item.addEventListener('click', function() { navigateToFolder(folder.path); });
                fileList.appendChild(item);
            });

            currentFiles.forEach(function(file) {
                const item = createFileListItem(file, false);
                item.addEventListener('click', function() { openFile(file); });
                fileList.appendChild(item);
            });
        }

        function createFileListItem(item, isFolder) {
            const li = document.createElement('li');
            li.className = isFolder ? 'folder' : 'file';
            li.dataset.name = (item.name || '').toLowerCase();

            const nameCol = document.createElement('div');
            nameCol.className = 'col-name';
            nameCol.innerHTML = `<span>${isFolder ? '📁' : '📄'}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(item.name || '')}</span>`;

            const sizeCol = document.createElement('div');
            sizeCol.className = 'col-size';
            sizeCol.textContent = isFolder ? '—' : formatFileSize(item.size);

            const dateCol = document.createElement('div');
            dateCol.className = 'col-modified';
            dateCol.textContent = formatDate(item.lastModified);

            const authorCol = document.createElement('div');
            authorCol.className = 'col-author';
            authorCol.textContent = item.author || 'Unknown';

            li.appendChild(nameCol);
            li.appendChild(sizeCol);
            li.appendChild(dateCol);
            li.appendChild(authorCol);

            return li;
        }

        function filterFileList() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const fileItems = document.querySelectorAll('#file-list li');

            fileItems.forEach(function(item) {
                const name = item.dataset.name || '';
                item.style.display = name.includes(searchTerm) ? '' : 'none';
            });
        }

        function updateBreadcrumb() {
            const list = document.getElementById('breadcrumb-list');
            list.innerHTML = '';

            const rootLi = document.createElement('li');
            const rootLink = document.createElement('a');
            rootLink.href = '#';
            rootLink.textContent = 'Root';
            rootLink.onclick = function(e) { e.preventDefault(); navigateToBreadcrumb(''); };
            rootLi.appendChild(rootLink);
            list.appendChild(rootLi);

            if (!currentFolderPath || currentFolderPath === '/') return;

            const parts = currentFolderPath.split('/').filter(function(p) { return p; });
            let accumulated = '';

            parts.forEach(function(part, idx) {
                accumulated += part + '/';
                const li = document.createElement('li');

                if (idx === parts.length - 1) {
                    li.className = 'current';
                    li.textContent = part;
                } else {
                    const link = document.createElement('a');
                    link.href = '#';
                    link.textContent = part;
                    const targetPath = accumulated;
                    link.onclick = function(e) { e.preventDefault(); navigateToBreadcrumb(targetPath); };
                    li.appendChild(link);
                }

                list.appendChild(li);
            });
        }

        function navigateToFolder(path) {
            currentFolderPath = path;
            document.getElementById('search-input').value = '';
            loadFolderContents();
        }

        function navigateToBreadcrumb(path) {
            currentFolderPath = path;
            document.getElementById('search-input').value = '';
            loadFolderContents();
        }

        function openFile(file) {
            if (!file.downloadUrl) {
                showToast('This file does not have an available SharePoint link.', 'error');
                return;
            }
            window.open(file.downloadUrl, '_blank', 'noopener');
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            document.querySelector('.docs-file-area').classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            e.stopPropagation();
            document.querySelector('.docs-file-area').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            document.querySelector('.docs-file-area').classList.remove('dragover');
            uploadFiles(e.dataTransfer.files);
        }

        function handleFileSelect(e) {
            uploadFiles(e.target.files);
            e.target.value = '';
        }

        function uploadFiles(fileList) {
            const progressEl = document.getElementById('upload-progress');
            progressEl.innerHTML = '';
            progressEl.style.display = 'block';

            Array.from(fileList || []).forEach(function(file) {
                if (file.size > MAX_UPLOAD_BYTES) {
                    showToast(`${file.name} exceeds 5 MB limit`, 'error');
                    return;
                }

                const progressItem = document.createElement('div');
                progressItem.className = 'progress-item';
                progressItem.innerHTML = `
                    <div class="progress-item-header">
                        <span></span>
                        <span class="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" style="width: 0%;"></div>
                    </div>
                `;
                progressItem.querySelector('span').textContent = file.name;
                progressEl.appendChild(progressItem);

                uploadFile(file, progressItem);
            });
        }

        function uploadFile(file, progressItem) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('folder_path', currentFolderPath);
            formData.append('contract_id', currentContractId);

            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
            const percentEl = progressItem.querySelector('.progress-percent');
            const fillEl = progressItem.querySelector('.progress-bar-fill');
            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    const percentComplete = (e.loaded / e.total) * 100;
                    percentEl.textContent = Math.round(percentComplete) + '%';
                    fillEl.style.width = percentComplete + '%';
                }
            });

            xhr.addEventListener('load', function() {
                let response = {};
                try {
                    response = JSON.parse(xhr.responseText || '{}');
                } catch (e) {
                    response = {};
                }

                if (xhr.status >= 200 && xhr.status < 300 && response.success) {
                    fillEl.style.width = '100%';
                    showToast(`${file.name} uploaded successfully`, 'success');
                    setTimeout(function() { loadFolderContents(); }, 500);
                } else {
                    showToast(response.error || response.message || `Error uploading ${file.name}`, 'error');
                }
            });

            xhr.addEventListener('error', function() {
                showToast(`Error uploading ${file.name}`, 'error');
            });

            xhr.open('POST', SHAREPOINT_FILES_URL);
            xhr.setRequestHeader('X-CSRFToken', csrfToken);
            xhr.send(formData);
        }

        function setCurrentPath() {
            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            fetch(SET_FILE_PATH_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({
                    contract_id: currentContractId,
                    file_path: currentFolderPath
                })
            })
                .then(function(r) {
                    return r.json().then(function(data) {
                        if (!r.ok || !data.success) {
                            throw new Error(data.error || data.message || 'Failed to save path');
                        }
                        return data;
                    });
                })
                .then(function() {
                    legacyPathDetected = false;
                    clearAlert();
                    showToast('Path saved to contract', 'success');
                })
                .catch(function(err) {
                    console.error('Error saving path:', err);
                    showToast(err.message || 'Error saving path', 'error');
                });
        }

        function showAlert(message, type) {
            const container = document.getElementById('alert-banner');
            container.innerHTML = buildBannerHtml(message, type);
        }

        function appendAlert(message, type) {
            const container = document.getElementById('alert-banner');
            container.insertAdjacentHTML('beforeend', buildBannerHtml(message, type));
        }

        function clearAlert() {
            document.getElementById('alert-banner').innerHTML = '';
        }

        function dismissBanner(btn) {
            btn.closest('.docs-banner').remove();
        }

        function buildBannerHtml(message, type) {
            const escaped = escapeHtml(message);
            return `<div class="docs-banner ${type}"><span>${escaped}</span><button class="docs-banner-close" onclick="dismissBanner(this)" aria-label="Dismiss">×</button></div>`;
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast-message ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(function() {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        function formatFileSize(bytes) {
            if (!bytes) return '—';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) return '—';
            return date.toLocaleDateString('en-US', {
                year: '2-digit',
                month: '2-digit',
                day: '2-digit'
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    </script>
</body>
</html>
