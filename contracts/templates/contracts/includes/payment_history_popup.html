{% load static %}

<div class="payment-history-modal hidden fixed-top fixed-bottom modal-backdrop-overlay d-flex align-items-center justify-content-center z-50"
     id="paymentHistoryPopup"
     data-source-page=""
     data-entity-type=""
     data-entity-id=""
     data-field-type=""
     style="position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.5);">
    <div class="bg-body rounded p-4 w-100" style="max-width:680px;">
        <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
                <h3 class="fs-5 fw-semibold" id="popupTitle">Payment History</h3>
                <p class="small text-body-secondary" id="popupSubtitle"></p>
                <p class="small fw-medium text-primary mt-2" id="currentValue"></p>
            </div>
            <button type="button" onclick="closePaymentHistoryPopup()" class="btn btn-link p-0 text-secondary" aria-label="Close">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div id="historyContent" class="mb-3" style="max-height: 24rem; overflow-y: auto;">
            <!-- History entries will be populated here -->
        </div>
        <form id="newHistoryForm">
            {% csrf_token %}
            <input type="hidden" id="editingPaymentId" value="">
            <p class="small text-body-secondary mb-2" id="historyFormModeLabel">Add entry</p>
            <div class="d-flex gap-3">
                <div class="flex-fill">
                    <label for="payment_amount" class="form-label">Amount</label>
                    <input type="number" id="payment_amount" name="payment_amount" step="0.01"
                           class="form-control"
                           required>
                </div>
                <div class="flex-fill">
                    <label for="payment_date" class="form-label">Date</label>
                    <input type="date" id="payment_date" name="payment_date"
                           class="form-control"
                           required>
                </div>
            </div>
            <div class="mb-3">
                <label for="reference_number" class="form-label">Reference Number</label>
                <input type="text" id="reference_number" name="reference_number"
                       class="form-control">
            </div>
            <div class="mb-3">
                <label for="payment_info" class="form-label">Additional Information</label>
                <textarea id="payment_info" name="payment_info" rows="3"
                         class="form-control"></textarea>
            </div>
            <div class="d-flex justify-content-end gap-2">
                <button type="button" id="historyFormCancelEditBtn"
                        class="btn btn-outline-secondary d-none"
                        onclick="resetPaymentHistoryForm()">
                    Cancel edit
                </button>
                <button type="button" onclick="closePaymentHistoryPopup()"
                        class="btn btn-secondary">
                    Close
                </button>
                <button type="submit" id="historyFormSubmitBtn"
                        class="btn btn-primary">
                    Save Entry
                </button>
            </div>
        </form>
    </div>
</div>

<script>
const notifyToast = (msg, type = 'info', duration = 3000) => {
    if (window.notify) {
        window.notify(type, msg, duration);
    }
};

function resetPaymentHistoryForm() {
    const form = document.getElementById('newHistoryForm');
    if (form) form.reset();
    document.getElementById('editingPaymentId').value = '';
    document.getElementById('historyFormModeLabel').textContent = 'Add entry';
    document.getElementById('historyFormSubmitBtn').textContent = 'Save Entry';
    document.getElementById('historyFormCancelEditBtn').classList.add('d-none');
}

function startEditPaymentHistoryEntry(entry) {
    document.getElementById('editingPaymentId').value = entry.id;
    document.getElementById('payment_amount').value = entry.payment_amount;
    document.getElementById('payment_date').value = entry.payment_date.split('T')[0];
    document.getElementById('reference_number').value = entry.reference_number || '';
    document.getElementById('payment_info').value = entry.payment_info || '';
    document.getElementById('historyFormModeLabel').textContent = 'Edit entry';
    document.getElementById('historyFormSubmitBtn').textContent = 'Update Entry';
    document.getElementById('historyFormCancelEditBtn').classList.remove('d-none');
    document.getElementById('newHistoryForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function openPaymentHistoryPopup(entityType, entityId, paymentType, sourcePage, currentValue) {
    const popup = document.getElementById('paymentHistoryPopup');
    popup.dataset.entityType = entityType;
    popup.dataset.entityId = entityId;
    popup.dataset.fieldType = paymentType;
    popup.dataset.sourcePage = sourcePage;
    resetPaymentHistoryForm();

    fetch(`/contracts/api/payment-history/${entityType}/${entityId}/details/`)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const details = data.details;
                const entityTitle = entityType === 'contract' ? 'Contract'
                    : entityType === 'clinshipment' ? 'Shipment' : 'CLIN';

                document.getElementById('popupTitle').textContent =
                    `Payment History - ${formatFieldType(paymentType)}`;
                document.getElementById('popupSubtitle').textContent =
                    `${entityTitle}: ${details.number}${details.contract_number ? ` (Contract: ${details.contract_number})` : ''}`;

                const formattedValue = currentValue ? formatCurrency(currentValue) : 'Not Available';
                document.getElementById('currentValue').textContent = `Current Value: ${formattedValue}`;

                loadPaymentHistory(entityType, entityId, paymentType);
            }
        });

    popup.classList.remove('hidden');
}

const form = document.getElementById('newHistoryForm');
if (form) {
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const popup = document.getElementById('paymentHistoryPopup');
        const entityId = popup.dataset.entityId;
        const entityType = popup.dataset.entityType;
        const fieldType = popup.dataset.fieldType;
        const editingId = document.getElementById('editingPaymentId').value;

        const jsonData = {
            payment_amount: parseFloat(formData.get('payment_amount')),
            payment_date: formData.get('payment_date'),
            payment_info: formData.get('payment_info') || '',
            reference_number: formData.get('reference_number') || ''
        };

        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const isEdit = !!editingId;
        const url = isEdit
            ? `/contracts/api/payment-history/${editingId}/update/`
            : `/contracts/api/payment-history/${entityType}/${entityId}/${fieldType}/`;
        const method = isEdit ? 'PATCH' : 'POST';

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify(jsonData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                loadPaymentHistory(entityType, entityId, fieldType);
                resetPaymentHistoryForm();

                const formattedValue = formatCurrency(data.new_total);
                document.getElementById('currentValue').textContent = `Current Value: ${formattedValue}`;

                if (typeof window.updateCellValue === 'function') {
                    window.updateCellValue(entityId, fieldType, data.new_total);
                }

                notifyToast(
                    isEdit ? 'Payment history entry updated' : 'Payment history entry added',
                    'success'
                );
            } else {
                throw new Error(data.error || 'Failed to save payment history entry');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            notifyToast(error.message || 'Failed to save payment history entry', 'error');
        });
    });
}

const historyContent = document.getElementById('historyContent');
if (historyContent) {
    historyContent.addEventListener('click', function(e) {
        const editBtn = e.target.closest('.js-edit-payment-history');
        if (editBtn) {
            startEditPaymentHistoryEntry({
                id: editBtn.dataset.paymentId,
                payment_amount: editBtn.dataset.paymentAmount,
                payment_date: editBtn.dataset.paymentDate,
                payment_info: editBtn.dataset.paymentInfo,
                reference_number: editBtn.dataset.referenceNumber,
            });
            return;
        }

        const btn = e.target.closest('.js-delete-payment-history');
        if (!btn) return;
        if (!confirm('Delete this payment history entry? This cannot be undone.')) return;

        const paymentId = btn.dataset.paymentId;
        const popup = document.getElementById('paymentHistoryPopup');
        const entityType = popup.dataset.entityType;
        const entityId = popup.dataset.entityId;
        const fieldType = popup.dataset.fieldType;
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        fetch(`/contracts/api/payment-history/${paymentId}/delete/`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': csrfToken },
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                if (String(document.getElementById('editingPaymentId').value) === String(paymentId)) {
                    resetPaymentHistoryForm();
                }
                loadPaymentHistory(entityType, entityId, fieldType);
                const formattedValue = formatCurrency(data.new_total);
                document.getElementById('currentValue').textContent = `Current Value: ${formattedValue}`;
                if (typeof window.updateCellValue === 'function') {
                    window.updateCellValue(entityId, fieldType, data.new_total);
                }
                notifyToast('Entry deleted', 'success');
            } else {
                notifyToast(data.error || 'Delete failed', 'error');
            }
        })
        .catch(() => notifyToast('Delete failed', 'error'));
    });
}

function loadPaymentHistory(entityType, entityId, paymentType) {
    fetch(`/contracts/api/payment-history/${entityType}/${entityId}/${paymentType}/`)
        .then(response => response.json())
        .then(data => {
            const historyContent = document.getElementById('historyContent');
            const popupEntityType = document.getElementById('paymentHistoryPopup').dataset.entityType;
            const showActions = popupEntityType !== 'finance_line';
            if (data.history && data.history.length > 0) {
                let html = `
                    <div class="table-responsive">
                        <table class="table table-sm table-hover payment-history-table mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-start" style="width:90px; white-space:nowrap">Date</th>
                                    <th class="text-end" style="width:90px; white-space:nowrap">Amount</th>
                                    <th class="text-start">Notes</th>
                                    <th class="text-start" style="width:80px; white-space:nowrap">Created By</th>
                                    ${showActions ? '<th style="width:72px"></th>' : ''}
                                </tr>
                            </thead>
                            <tbody>
                `;

                data.history.forEach(entry => {
                    const ref = (entry.reference_number || '').replace(/"/g, '&quot;');
                    const info = (entry.payment_info || '').replace(/"/g, '&quot;');
                    html += `
                        <tr>
                            <td class="small" style="width:90px; white-space:nowrap">${formatDate(entry.payment_date)}</td>
                            <td class="small text-end" style="width:90px; white-space:nowrap">${formatCurrency(entry.payment_amount)}</td>
                            <td class="small">${entry.payment_info || entry.reference_number || '-'}</td>
                            <td class="small" style="width:80px; white-space:nowrap">${entry.created_by}</td>
                            ${showActions && entry.id ? `
                            <td class="text-end text-nowrap" style="width:72px">
                                <button type="button" class="btn btn-link btn-sm p-0 text-primary js-edit-payment-history"
                                        data-payment-id="${entry.id}"
                                        data-payment-amount="${entry.payment_amount}"
                                        data-payment-date="${entry.payment_date}"
                                        data-payment-info="${info}"
                                        data-reference-number="${ref}"
                                        title="Edit entry">Edit</button>
                                <button type="button" class="btn btn-link btn-sm p-0 text-danger js-delete-payment-history ms-1"
                                        data-payment-id="${entry.id}"
                                        title="Delete entry"
                                        style="line-height:1">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                      <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                                      <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                                    </svg>
                                </button>
                            </td>` : ''}
                        </tr>
                    `;
                });

                const totalColspan = showActions ? 3 : 2;
                html += `
                            </tbody>
                            <tfoot class="table-secondary">
                                <tr>
                                    <td class="small fw-medium">Total</td>
                                    <td class="small fw-medium text-end">${formatCurrency(data.total)}</td>
                                    <td colspan="${totalColspan}"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                `;
                historyContent.innerHTML = html;

                const formattedTotal = formatCurrency(data.total);
                document.getElementById('currentValue').textContent = `Current Value: ${formattedTotal}`;

                const entityTypeForSync = document.getElementById('paymentHistoryPopup').dataset.entityType;
                if (typeof window.updateCellValue === 'function' && entityTypeForSync !== 'contract_packaging') {
                    window.updateCellValue(entityId, paymentType, data.total);
                }
            } else {
                historyContent.innerHTML = '<p class="small text-body-secondary text-center py-3">No payment history found</p>';
            }
        });
}

function closePaymentHistoryPopup() {
    const popup = document.getElementById('paymentHistoryPopup');
    popup.classList.add('hidden');
    resetPaymentHistoryForm();
}

function formatFieldType(type) {
    return type.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
}

function formatCurrency(amount) {
    if (amount === null || amount === undefined || amount === '' || amount === 'NaN') {
        return 'Not Available';
    }

    const cleanAmount = typeof amount === 'string'
        ? amount.replace(/,/g, '').trim()
        : amount;

    const numericAmount = typeof cleanAmount === 'string'
        ? parseFloat(cleanAmount)
        : cleanAmount;

    if (isNaN(numericAmount)) {
        return 'Not Available';
    }

    return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    }).format(numericAmount);
}

function formatDate(dateString) {
    if (!dateString) return '—';
    const [year, month, day] = dateString.split('T')[0].split('-');
    return `${parseInt(month)}/${parseInt(day)}/${year}`;
}

setTimeout(function() {
    if (window.__paymentHistoryOutsideClickBound) {
        return;
    }
    window.__paymentHistoryOutsideClickBound = true;
    document.addEventListener('click', function(e) {
        const popup = document.getElementById('paymentHistoryPopup');
        if (!popup || popup.classList.contains('hidden')) {
            return;
        }
        if (popup.contains(e.target)) {
            return;
        }
        if (e.target.closest('[onclick*="openPaymentHistoryPopup"]')) {
            return;
        }
        if (e.target.closest('[data-clin][data-type], .partial-value-cell')) {
            return;
        }
        closePaymentHistoryPopup();
    });
}, 0);
</script>
