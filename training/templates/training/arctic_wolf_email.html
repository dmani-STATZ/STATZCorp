{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ subject }}</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; color: #000; margin: 0; padding: 0; background: #f4f4f4; }
        .wrapper { width: 100%; background: #f4f4f4; padding: 24px 0; }
        .container { width: 100%; max-width: 680px; margin: 0 auto; background: #ffffff; }
        .inner { padding: 24px; }
        .muted { color: #444; }
        .bold { font-weight: bold; }
        hr { border: 0; height: 1px; background: #e5e5e5; margin: 24px 0; }
        .lang { font-size: 12px; text-align: right; }
        .lang a { color: #1f2937; text-decoration: none; }
        .actions { text-align: right; padding: 8px 0 0; }
        .action-btn { background: #374151; color: #fff; border: 0; border-radius: 4px; padding: 6px 10px; cursor: pointer; margin-left: 8px; }
        @media (prefers-color-scheme: dark) {
            body { background: #111; color: #f5f5f5; }
            .container { background: #1f2937; color: #f5f5f5; }
            hr { background: #374151; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <!-- Utility actions for the preview page only (not part of email) -->
            <div class="inner actions" id="preview-actions">
                <span class="muted">Preview tools:</span>
                <a href="{% url 'training:arctic_wolf_email_eml' course.slug %}?audience={{ audience|urlencode }}" class="action-btn" style="text-decoration:none; display:inline-block;">Download EML</a>
                <button class="action-btn" onclick="copySubject()">Copy Subject</button>
                <button class="action-btn" onclick="copyHtml()">Copy HTML</button>
            </div>

            <div class="inner" id="email-root">{% include "training/arctic_wolf_email_body.html" %}</div>
        </div>
    </div>

    <script>
        function copySubject(){
            const subject = '{{ subject|escapejs }}';
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(subject).then(()=>alert('Subject copied')); return;
            }
            const t = document.createElement('textarea');
            t.value = subject; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('Subject copied');
        }
        function copyHtml(){
            const root = document.getElementById('email-root');
            const html = root.outerHTML;
            if (navigator.clipboard && window.ClipboardItem) {
                const blob = new Blob([html], {type: 'text/html'});
                const item = new ClipboardItem({'text/html': blob});
                navigator.clipboard.write([item]).then(()=>alert('HTML copied')); return;
            }
            // Fallback: select and copy
            const range = document.createRange();
            range.selectNode(root);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            document.execCommand('copy');
            sel.removeAllRanges();
            alert('HTML copied');
        }
    </script>
</body>
</html>
