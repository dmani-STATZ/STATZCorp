<!-- {# Reusable matcher modal for buyer/IDIQ/NSN/supplier searches.

   Opened via window.IntakeMatch.open({matchType, targetPath, originalText}).
   Calls the unified /intake/drafts/<pk>/match/ endpoint with action=search
   and action=apply/clear under the hood. On apply, fires a CustomEvent
   `intake:match-applied` so the page can refresh the field display.
#} -->

<div id="intake-match-modal" class="position-fixed top-0 start-0 w-100 h-100 d-none"
     style="background-color: rgba(0,0,0,0.4); z-index: 1050;">
    <div class="card mx-auto mt-5 shadow-lg" style="max-width: 540px;">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                Match <span id="intake-match-title">record</span>
            </h5>
            <button type="button" class="btn-close" data-match-close></button>
        </div>
        <div class="card-body">
            <div class="mb-3 p-2 bg-light rounded">
                <small class="text-muted">Parsed value:</small>
                <div id="intake-match-original" class="fw-semibold"></div>
                <div id="intake-match-original-description" class="small text-muted d-none"></div>
            </div>

            <div class="input-group mb-2">
                <input type="text" id="intake-match-q" class="form-control"
                       placeholder="Type at least 3 characters to search">
                <button type="button" class="btn btn-primary" data-match-search>Search</button>
            </div>
            <div id="intake-match-status" class="small text-muted mb-2"></div>

            <div id="intake-match-results" class="list-group" style="max-height: 320px; overflow-y: auto;">
            </div>

            <div id="intake-match-create-wrap" class="mt-3 d-none">
                <button type="button" class="btn btn-link btn-sm px-0" data-match-create-toggle>
                    + Add new <span class="intake-match-create-type">record</span>
                </button>
                <div id="intake-match-create-panel" class="d-none border rounded p-2 mt-1">
                    {# Buyer fields #}
                    <div data-create-fields="buyer" class="d-none">
                        <label class="form-label small mb-1">Buyer description</label>
                        <input type="text" class="form-control form-control-sm"
                               data-create-field="description" placeholder="e.g. DLA Land and Maritime">
                    </div>
                    {# NSN fields #}
                    <div data-create-fields="nsn" class="d-none">
                        <label class="form-label small mb-1">NSN code</label>
                        <input type="text" class="form-control form-control-sm mb-2"
                               data-create-field="nsn_code" placeholder="1234-12-345-6789">
                        <label class="form-label small mb-1">Description (optional)</label>
                        <input type="text" class="form-control form-control-sm"
                               data-create-field="description">
                    </div>
                    {# Supplier fields #}
                    <div data-create-fields="supplier" class="d-none">
                        <label class="form-label small mb-1">Supplier name</label>
                        <input type="text" class="form-control form-control-sm mb-2"
                               data-create-field="name">
                        <label class="form-label small mb-1">CAGE code</label>
                        <input type="text" class="form-control form-control-sm"
                               data-create-field="cage_code">
                    </div>
                    <div class="d-flex justify-content-end mt-2">
                        <button type="button" class="btn btn-success btn-sm" data-match-create-submit>
                            Create &amp; Use
                        </button>
                    </div>
                    <div id="intake-match-create-status" class="small text-muted mt-1"></div>
                </div>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between">
            <button type="button" class="btn btn-outline-danger btn-sm" data-match-clear>
                Clear current match
            </button>
            <button type="button" class="btn btn-secondary" data-match-close>Cancel</button>
        </div>
    </div>
</div>
