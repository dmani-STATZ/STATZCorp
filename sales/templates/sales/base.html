{% extends "base_template.html" %}
{% load static %}

{% block body %}
<div style="padding: 0 2rem 2rem;">

    {# ── Sales sub-navigation ───────────────────────────────────────────── #}
    <nav style="display:flex; gap:0.25rem; border-bottom:2px solid var(--border-color, #e5e7eb); margin-bottom:1.75rem; padding-top:1.25rem;">
        <a href="{% url 'sales:solicitation_list' %}"
           style="padding:0.5rem 1rem; font-size:0.875rem; font-weight:500; border-radius:6px 6px 0 0; text-decoration:none; border-bottom:2px solid transparent; margin-bottom:-2px;
                  {% if request.resolver_match.url_name == 'solicitation_list' %}
                      border-bottom-color: var(--company-primary, #004eb3); color: var(--company-primary, #004eb3);
                  {% else %}
                      color: var(--text-muted, #6b7280);
                  {% endif %}">
            Solicitations
        </a>
        <a href="{% url 'sales:import_upload' %}"
           style="padding:0.5rem 1rem; font-size:0.875rem; font-weight:500; border-radius:6px 6px 0 0; text-decoration:none; border-bottom:2px solid transparent; margin-bottom:-2px;
                  {% if request.resolver_match.url_name == 'import_upload' %}
                      border-bottom-color: var(--company-primary, #004eb3); color: var(--company-primary, #004eb3);
                  {% else %}
                      color: var(--text-muted, #6b7280);
                  {% endif %}">
            Import
        </a>
        {% if request.user.is_staff %}
        <a href="{% url 'sales:backfill_nsn' %}"
           style="padding:0.5rem 1rem; font-size:0.875rem; font-weight:500; border-radius:6px 6px 0 0; text-decoration:none; border-bottom:2px solid transparent; margin-bottom:-2px;
                  {% if request.resolver_match.url_name == 'backfill_nsn' %}
                      border-bottom-color: var(--company-primary, #004eb3); color: var(--company-primary, #004eb3);
                  {% else %}
                      color: var(--text-muted, #6b7280);
                  {% endif %}">
            NSN Backfill
        </a>
        {% endif %}
    </nav>

    {% block content %}{% endblock content %}

</div>
{% endblock body %}
