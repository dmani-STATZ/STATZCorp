{% extends "sales/base.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">

<h1 class="h4 mb-1">Add FSC Capabilities</h1>

<form method="post">
  {% csrf_token %}
  <div class="mb-3">
    <label for="fscs" class="form-label fw-semibold">
      FSC Code List <span class="text-danger">*</span>
    </label>
    <textarea
      id="fscs"
      name="fscs"
      class="form-control font-monospace"
      rows="10"
      placeholder="Paste one FSC code per line.
Example:
5310
8465
2530"
    ></textarea>
    <div class="form-text">
      One 4-digit FSC code per line. Duplicates are skipped.
      FSC capabilities drive Tier 3 matching — this supplier will
      appear on all solicitations in these supply classes.
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Add FSCs</button>
  <a href="{% url 'sales:supplier_detail' supplier.id %}?tab=capabilities"
     class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock content %}
