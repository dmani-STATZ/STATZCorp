{% extends "sales/base.html" %}
{% block content %}
<style>
  .btn { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; font-weight: 500; text-decoration: none; cursor: pointer; border: none; }
  .btn-primary { background: var(--company-primary, #004eb3); color: #fff; }
  .btn-ghost { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 0.75rem; font-weight: 600; color: #6b7280; margin-bottom: 0.25rem; }
  .form-control { padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; width: 100%; max-width: 10rem; }
  .error { font-size: 0.8125rem; color: #b91c1c; margin-top: 0.25rem; }
</style>

<div style="margin-bottom: 1rem;">
  <a href="{% url 'sales:supplier_detail' supplier_id=supplier.id %}" style="font-size: 0.875rem; color: #6b7280;">← {{ supplier.name|default:supplier.cage_code }}</a>
</div>
<h1 style="font-size: 1.25rem; font-weight: 600; margin: 0 0 1rem;">Add FSC Capability</h1>

<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label class="form-label" for="id_fsc_code">FSC Code (4 characters) *</label>
    <input type="text" name="fsc_code" id="id_fsc_code" class="form-control" placeholder="e.g. 5310" value="{{ request.POST.fsc_code }}" maxlength="4">
    {% if errors.fsc_code %}<div class="error">{{ errors.fsc_code }}</div>{% endif %}
  </div>
  <div class="form-group">
    <label class="form-label" for="id_notes">Notes</label>
    <input type="text" name="notes" id="id_notes" class="form-control" value="{{ request.POST.notes }}" maxlength="255">
  </div>
  <div style="display: flex; gap: 0.5rem;">
    <button type="submit" class="btn btn-primary">Add FSC</button>
    <a href="{% url 'sales:supplier_detail' supplier_id=supplier.id %}" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock content %}
